<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRONOGRAMA ÍNTIMOS 2026 - NOVA ALIANÇA</title>
<style>
:root{--text:#0f172a;--muted:#64748b;--primary:#2563eb;--secondary:#0ea5e9;--dark:#1e40af;--line:#dbeafe;--soft:#eff6ff;--shadow:0 18px 45px rgba(30,64,175,.16)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 48%,#e0f2fe 100%)}
header{text-align:center;padding:42px 16px 24px}.badge{display:inline-block;padding:8px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--primary);font-weight:800;box-shadow:var(--shadow)}
h1{margin:16px auto 8px;max-width:980px;font-size:clamp(30px,5vw,56px);letter-spacing:-.045em}header p{margin:0 auto;max-width:760px;color:var(--muted);line-height:1.5}
main{width:min(1120px,calc(100% - 28px));margin:0 auto 42px}.panel{background:rgba(255,255,255,.90);border:1px solid rgba(255,255,255,.75);border-radius:28px;box-shadow:var(--shadow);padding:18px;backdrop-filter:blur(8px)}
.controls{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;margin-bottom:14px}input,select{border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 14px;font-size:14px;outline:none}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.stat strong{display:block;font-size:27px;color:var(--dark)}.stat span{font-size:13px;color:var(--muted)}
.timeline{display:grid;gap:14px}.day{position:sticky;top:0;z-index:2;margin-top:8px;padding:13px 16px;border-radius:18px;background:linear-gradient(135deg,var(--dark),var(--secondary));color:white;font-size:23px;font-weight:900;box-shadow:var(--shadow)}
.card{background:white;border:1px solid var(--line);border-left:8px solid var(--primary);border-radius:22px;padding:18px;display:grid;grid-template-columns:110px 1fr;gap:18px;align-items:start}.time{font-size:25px;font-weight:900;color:var(--primary)}
h2{font-size:21px;margin:0 0 8px}.resp{margin:6px 0;color:var(--muted)}.songs{white-space:pre-line;margin-top:10px;padding:13px;border-radius:16px;background:var(--soft);border:1px solid #bfdbfe;line-height:1.45;color:#1e3a8a}
.empty{padding:28px;text-align:center;color:var(--muted);background:white;border:1px dashed var(--line);border-radius:20px}footer{text-align:center;color:var(--muted);font-size:12px;margin:14px 0 0}
@media(max-width:760px){.controls,.stats{grid-template-columns:1fr}.card{grid-template-columns:1fr;gap:8px}}
</style>
</head>
<body>
<header><span class="badge">Cronograma oficial</span><h1>CRONOGRAMA ÍNTIMOS 2026 - NOVA ALIANÇA</h1><p>Programação por dia e horário, com atividades, músicas/orações e responsáveis.</p></header>
<main><section class="panel"><div class="controls"><input id="search" placeholder="Buscar atividade, música, oração ou responsável..." type="search" /><select id="day"><option value="">Todos os dias</option></select></div><div class="stats"><div class="stat"><strong id="total">0</strong><span>Atividades</span></div><div class="stat"><strong id="days">0</strong><span>Dias</span></div><div class="stat"><strong id="start">-</strong><span>Primeiro horário</span></div></div><div id="content" class="timeline"></div><footer>Gerado a partir da planilha enviada.</footer></section></main>
<script>
const DATA=[{"dia": "Sexta", "horario": "19:30", "atividade": "Recepção", "musicas": "", "responsavel": ""}, {"dia": "Sexta", "horario": "20:30", "atividade": "Animação", "musicas": "- Pode Chover (G)\n- Como não falar do seu amor (G)\n\nOração: Como em Pentecostes (G)", "responsavel": "Animador:\nDança:"}, {"dia": "Sexta", "horario": "20:45", "atividade": "Pregação - Amor de Deus", "musicas": "- Ele me Ama - MFA (G)\n- Meu Pai\n- Só me abraça e me ama amor\n- Novas Vestes", "responsavel": ""}, {"dia": "Sexta", "horario": "21:35", "atividade": "Janta", "musicas": "", "responsavel": ""}, {"dia": "Sexta", "horario": "22:25", "atividade": "Animação", "musicas": "- A Festa (A)\n- Desperta (D)\n- Terra Seca (D)\n\nOração: Romanos 12", "responsavel": "Animador:\nDança:"}, {"dia": "Sexta", "horario": "22:45", "atividade": "Teatro - Pecado", "musicas": "", "responsavel": ""}, {"dia": "Sexta", "horario": "22:55", "atividade": "Pregação - Pecado", "musicas": "- Jardim\n- Luto contra mim", "responsavel": ""}, {"dia": "Sexta", "horario": "23:40", "atividade": "Dormir", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "08:00", "atividade": "Acordar", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "08:30", "atividade": "Oração da Manhã", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "09:00", "atividade": "Café da Manhã", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "09:30", "atividade": "Divisão das Equipes + Partilha", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "10:00", "atividade": "Animação", "musicas": "- Dança de Avivamento (D)\n- A morte Foi vencida (D)\n- Ao Rugir do Leão (Bb)\n\nOração: Eu quero teu fogo", "responsavel": "Animador:\nDança:"}, {"dia": "Sábado", "horario": "10:30", "atividade": "Pregação - Salvação", "musicas": "- Eu em Seu Lugar - Colo de Deus\nOlhando Tua Paixão - Juninho Casimiro\nQuem é esse Deus - MSH\n- Santo Sácrificio - Rodrigo Torres\n- Teu de Novo - Nova Aliança\nQuem é esse Deus - MSH\nRedenção - Frei Gilson\nEra Eu - Casa Worship\nJesus meu esposo\nIsaias 53", "responsavel": ""}, {"dia": "Sábado", "horario": "12:00", "atividade": "Almoço", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "14:00", "atividade": "Família + Abraço", "musicas": "Tua Família\nEu e Minha Casa - Julliany Souza", "responsavel": ""}, {"dia": "Sábado", "horario": "15:30", "atividade": "Animação", "musicas": "- Obra Nova\n- Sentinela\n\nOração: Faz-me cheio de Ti", "responsavel": "Animador:\nDança:"}, {"dia": "Sábado", "horario": "15:30", "atividade": "Café da Tarde", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "16:00", "atividade": "Gincana", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "17:30", "atividade": "Banho", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "19:00", "atividade": "Animação", "musicas": "- Manifesta\n- Templo Vivo\n- Sustenta o Fogo\n- Festa do Fogo\n\nOração: Onde o Espírito de Deus está", "responsavel": "Animador:\nDança:"}, {"dia": "Sábado", "horario": "19:15", "atividade": "Espírito Santo \n+\nEfusão", "musicas": "Me leva - Colo\nBatiza-me - MFA\nQueima de Novo - Colo\nEu quero queimar - Nova Aliança\nLucas 3 - Kairós", "responsavel": ""}, {"dia": "Sábado", "horario": "21:30", "atividade": "Festa Junina + Janta", "musicas": "", "responsavel": ""}, {"dia": "Sábado", "horario": "23:30", "atividade": "Dormir", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "08:00", "atividade": "Acordar", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "08:30", "atividade": "Oração da Manhã", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "09:00", "atividade": "Café da Manhã", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "09:30", "atividade": "Animação", "musicas": "- Parapapa\n- Quem é essa\n- Profetiza\n\nOração: Ele Vem - Colo (Refrão)", "responsavel": "Animador:\nDança:"}, {"dia": "Domingo", "horario": "09:45", "atividade": "Ministração Dança", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "10:00", "atividade": "Pregação - Maria", "musicas": "Abraça-me mamãe - MFA\nVentre de Fogo - MBN\nAcaso não sabeis - Colo\nColo de mãe - Colo", "responsavel": ""}, {"dia": "Domingo", "horario": "10:50", "atividade": "Intervalo", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "11:00", "atividade": "Pregação Tema", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "12:00", "atividade": "Partilha", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "12:30", "atividade": "Almoço", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "13:30", "atividade": "Animação", "musicas": "- Sou Estrangeiro Aqui\n- Quero Chamar Tua Atenção\n- Dança da Amizade\n- Seja Elevado\n- Ide\n- A Pedido\n\n- Me Leva", "responsavel": ""}, {"dia": "Domingo", "horario": "14:00", "atividade": "Teatro", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "14:10", "atividade": "Pregação - Vida Nova no E.S / Comunidade", "musicas": "Chamado Irresistível - RCC Paraná\nPríncipe da Paz - Flavinho\nEis me aqui - Colo de Deus\nAlma Missionária\nEu quero queimar - Nova Aliança", "responsavel": ""}, {"dia": "Domingo", "horario": "15:00", "atividade": "Partilha", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "15:30", "atividade": "Arrumar Missa", "musicas": "", "responsavel": ""}, {"dia": "Domingo", "horario": "16:00", "atividade": "Santa Missa", "musicas": "", "responsavel": ""}];
const norm=v=>String(v||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
const day=document.getElementById('day'), search=document.getElementById('search'), content=document.getElementById('content');
[...new Set(DATA.map(x=>x.dia).filter(Boolean))].forEach(d=>day.innerHTML+=`<option>${d}</option>`);
function getList(){const q=norm(search.value), d=day.value;return DATA.filter(x=>(!d||x.dia===d)&&(!q||norm(Object.values(x).join(' ')).includes(q)));}
function render(){const list=getList();total.textContent=list.length;days.textContent=new Set(list.map(x=>x.dia)).size;start.textContent=list[0]?.horario||'-';if(!list.length){content.className='empty';content.textContent='Nenhuma atividade encontrada.';return}content.className='timeline';let last='';content.innerHTML=list.map(x=>{let label='';if(x.dia!==last){last=x.dia;label=`<div class="day">${x.dia}</div>`}return `${label}<article class="card"><div class="time">${x.horario||'--:--'}</div><div><h2>${x.atividade}</h2>${x.responsavel?`<p class="resp"><b>Responsável:</b> ${x.responsavel}</p>`:''}${x.musicas?`<div class="songs"><b>Músicas / Oração:</b>
${x.musicas}</div>`:''}</div></article>`}).join('');}
search.addEventListener('input',render);day.addEventListener('change',render);render();
</script>
</body>
</html>
